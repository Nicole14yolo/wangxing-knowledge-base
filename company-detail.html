<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司详情 | 王兴饭否思想库</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">王兴思想库</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="corpus.html">语料库</a></li>
        <li><a href="years.html">年度</a></li>
        <li><a href="companies.html" class="active">公司</a></li>
        <li><a href="people.html">人物</a></li>
        <li><a href="models.html">思维</a></li>
        <li><a href="media.html">书影</a></li>
        <li><a href="quotes.html">金句</a></li>
        <li><a href="search.html">搜索</a></li>
      </ul>
    </div>
  </nav>

  <div class="detail-header" id="detail-header">
    <div class="container">
      <a href="companies.html" style="color: var(--color-mid-gray); font-size: 0.9rem;">← 返回公司列表</a>
      <h1 id="company-name" style="margin-top: 16px;">加载中...</h1>
      <div class="detail-meta" id="company-meta"></div>
    </div>
  </div>

  <section class="detail-content">
    <div class="container">
      <div class="markdown-body" id="markdown-content">
        <p style="color: var(--color-mid-gray);">正在加载内容...</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">王兴思想库</div>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="companies.html">公司</a>
          <a href="people.html">人物</a>
          <a href="models.html">思维模型</a>
          <a href="quotes.html">金句</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const companyName = params.get('name');

    if (!companyName) {
      document.getElementById('company-name').textContent = '未指定公司名称';
      document.getElementById('markdown-content').innerHTML = '<p>请在URL中指定公司名称，例如：?name=美团</p>';
    } else {
      loadCompany(companyName);
    }

    async function loadCompany(name) {
      try {
        const response = await fetch('data/companies.json');
        const companies = await response.json();
        const markdown = companies[name];

        if (markdown) {
          document.getElementById('company-name').textContent = name;
          extractAndRenderMeta(markdown);
          renderContent(markdown);
        } else {
          showNotFound(name);
        }
      } catch (error) {
        console.error('Failed to load company:', error);
        document.getElementById('markdown-content').innerHTML = '<p>加载失败，请确保通过服务器访问</p>';
      }
    }

    function extractAndRenderMeta(markdown) {
      const countMatch = markdown.match(/mention_count:\s*(\d+)/);
      const domainMatch = markdown.match(/domain:\s*"([^"]+)"/);

      const meta = [];
      if (countMatch) {
        meta.push(`<div class="detail-meta-item"><div class="detail-meta-label">提及次数</div><div class="detail-meta-value">${countMatch[1]} 次</div></div>`);
      }
      if (domainMatch) {
        meta.push(`<div class="detail-meta-item"><div class="detail-meta-label">领域</div><div class="detail-meta-value">${domainMatch[1]}</div></div>`);
      }

      document.getElementById('company-meta').innerHTML = meta.join('');
    }

    function showNotFound(name) {
      document.getElementById('company-name').textContent = name;
      document.getElementById('company-meta').innerHTML = '';
      document.getElementById('markdown-content').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <h2 style="color: var(--color-mid-gray);">「${name}」档案暂未收录</h2>
        </div>
      `;
    }

    function renderContent(markdown) {
      // Remove YAML frontmatter - everything from --- to the next ---
      const body = markdown.replace(/^---\n[\s\S]*?\n---\n*/, '').trim();

      // Configure marked
      const renderer = new marked.Renderer();
      renderer.link = function(href, title, text) {
        if (href && href.startsWith('[[')) {
          // It's a wikilink, convert to search
          const cleanText = text || href.replace(/\[\[|\]\]/g, '').split('|').pop();
          return `<a href="search.html?q=${encodeURIComponent(cleanText)}" style="color: var(--color-orange);">${cleanText}</a>`;
        }
        return `<a href="${href || '#'}"${title ? ` title="${title}"` : ''}>${text}</a>`;
      };

      marked.setOptions({ renderer, gfm: true });
      document.getElementById('markdown-content').innerHTML = marked.parse(body);
    }
  </script>
</body>
</html>
