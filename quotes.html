<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金句精选 | 王兴饭否思想库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--color-light-gray);
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--color-mid-gray);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-family: var(--font-body);
    }

    .tab-btn:hover {
      color: var(--color-dark);
    }

    .tab-btn.active {
      color: var(--color-orange);
      border-bottom-color: var(--color-orange);
      font-weight: 600;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Hall of Fame */
    .hall-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }

    .hall-card {
      background: white;
      border: 1px solid var(--color-light-gray);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      transition: all 0.2s;
    }

    .hall-card:hover {
      border-color: var(--color-orange);
      box-shadow: var(--shadow-soft);
    }

    .hall-number {
      position: absolute;
      top: -12px;
      left: 20px;
      background: var(--color-orange);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: var(--font-heading);
    }

    .hall-text {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--color-dark);
      margin-bottom: 16px;
    }

    .hall-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hall-date {
      font-size: 0.85rem;
      color: var(--color-mid-gray);
    }

    .hall-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hall-tag {
      font-size: 0.75rem;
      padding: 3px 10px;
      background: var(--color-warm-bg);
      color: var(--color-orange);
      border-radius: 12px;
    }

    /* Theme quotes */
    .theme-selector {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .theme-chip {
      padding: 8px 16px;
      border: 1px solid var(--color-light-gray);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: white;
    }

    .theme-chip:hover, .theme-chip.active {
      background: var(--color-orange);
      color: white;
      border-color: var(--color-orange);
    }

    .quotes-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .quote-item {
      background: white;
      border: 1px solid var(--color-light-gray);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
    }

    .quote-item:hover {
      border-color: var(--color-orange);
      box-shadow: var(--shadow-soft);
    }

    .quote-item-text {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--color-dark);
      margin-bottom: 12px;
    }

    .quote-item-meta {
      font-size: 0.85rem;
      color: var(--color-mid-gray);
    }

    /* Year selector */
    .year-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .year-chip {
      padding: 6px 14px;
      border: 1px solid var(--color-light-gray);
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: var(--font-heading);
      transition: all 0.2s;
      background: white;
    }

    .year-chip:hover, .year-chip.active {
      background: var(--color-dark);
      color: white;
      border-color: var(--color-dark);
    }

    .year-context {
      background: var(--color-warm-bg);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .year-context h3 {
      font-family: var(--font-heading);
      margin-bottom: 12px;
      color: var(--color-dark);
    }

    .year-context p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--color-mid-gray);
      margin-bottom: 8px;
    }

    .year-context p:last-child {
      margin-bottom: 0;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--color-light-gray);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--color-mid-gray);
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--color-orange);
      color: var(--color-orange);
    }

    .copy-btn.copied {
      background: var(--color-orange);
      color: white;
      border-color: var(--color-orange);
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">王兴思想库</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="corpus.html">语料库</a></li>
        <li><a href="years.html">年度</a></li>
        <li><a href="companies.html">公司</a></li>
        <li><a href="people.html">人物</a></li>
        <li><a href="models.html">思维</a></li>
        <li><a href="media.html">书影</a></li>
        <li><a href="quotes.html" class="active">金句</a></li>
        <li><a href="search.html">搜索</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <div class="detail-header">
    <div class="container">
      <h1>金句精选</h1>
      <p style="color: var(--color-mid-gray); margin-top: 0.5rem;">
        从 14,194 条语录中精选的最具代表性语录
      </p>
      <div class="detail-meta" style="margin-top: 20px;">
        <div class="detail-meta-item">
          <div class="detail-meta-label">金句堂</div>
          <div class="detail-meta-value">50 条</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">主题精选</div>
          <div class="detail-meta-value">16 × 20 条</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">年度精选</div>
          <div class="detail-meta-value">15 × 15 条</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">总计</div>
          <div class="detail-meta-value">595 条</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <section class="section" style="padding-top: 40px;">
    <div class="container">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('hall', this)">🏆 金句堂 Top 50</button>
        <button class="tab-btn" onclick="switchTab('theme', this)">🏷️ 按主题</button>
        <button class="tab-btn" onclick="switchTab('year', this)">📅 按年份</button>
      </div>

      <!-- Hall of Fame -->
      <div class="tab-content active" id="tab-hall">
        <div class="hall-grid" id="hall-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- By Theme -->
      <div class="tab-content" id="tab-theme">
        <div class="theme-selector" id="theme-selector">
          <!-- Populated by JS -->
        </div>
        <div class="quotes-list" id="theme-quotes">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- By Year -->
      <div class="tab-content" id="tab-year">
        <div class="year-selector" id="year-selector">
          <!-- Populated by JS -->
        </div>
        <div id="year-context" class="year-context" style="display:none;"></div>
        <div class="quotes-list" id="year-quotes">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" style="margin-top: 60px;">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">王兴思想库</div>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="search.html">搜索</a>
          <a href="corpus.html">语料</a>
          <a href="models.html">思维模型</a>
          <a href="quotes.html">金句</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    let quotesData = {};
    let currentTheme = null;
    let currentYear = null;

    async function loadData() {
      try {
        const res = await fetch('data/quotes.json');
        quotesData = await res.json();
        renderHall();
        renderThemeSelector();
        renderYearSelector();
      } catch (e) {
        console.error('Failed to load quotes:', e);
      }
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    function copyQuote(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function renderHall() {
      const grid = document.getElementById('hall-grid');
      grid.innerHTML = quotesData.hall.map((q, i) => `
        <div class="hall-card">
          <div class="hall-number">${i + 1}</div>
          <div class="hall-text">「${q.text}」</div>
          <div class="hall-meta">
            <span class="hall-date">📅 ${q.date}</span>
            <button class="copy-btn" onclick="copyQuote(this.closest('.hall-card').querySelector('.hall-text').textContent, this)">复制</button>
          </div>
        </div>
      `).join('');
    }

    function renderThemeSelector() {
      const selector = document.getElementById('theme-selector');
      const themes = Object.keys(quotesData.byTheme).sort();
      selector.innerHTML = themes.map(t => `
        <div class="theme-chip" onclick="selectTheme('${t}', this)">${t}</div>
      `).join('');
      // Auto-select first
      if (themes.length > 0) {
        const firstChip = selector.querySelector('.theme-chip');
        selectTheme(themes[0], firstChip);
      }
    }

    function selectTheme(theme, el) {
      document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      currentTheme = theme;
      const data = quotesData.byTheme[theme];
      const container = document.getElementById('theme-quotes');
      container.innerHTML = data.quotes.map((q, i) => `
        <div class="quote-item">
          <div class="quote-item-text">「${q.text}」</div>
          <div class="quote-item-meta" style="display:flex; justify-content:space-between; align-items:center;">
            <span>📅 ${q.date}</span>
            <button class="copy-btn" onclick="copyQuote(this.closest('.quote-item').querySelector('.quote-item-text').textContent, this)">复制</button>
          </div>
        </div>
      `).join('');
    }

    function renderYearSelector() {
      const selector = document.getElementById('year-selector');
      const years = Object.keys(quotesData.byYear).sort();
      selector.innerHTML = years.map(y => `
        <div class="year-chip" onclick="selectYear('${y}', this)">${y}</div>
      `).join('');
      // Auto-select last year
      if (years.length > 0) {
        const lastChip = selector.querySelectorAll('.year-chip');
        const lastYear = years[years.length - 1];
        selectYear(lastYear, lastChip[lastChip.length - 1]);
      }
    }

    function selectYear(year, el) {
      document.querySelectorAll('.year-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      currentYear = year;
      const data = quotesData.byYear[year];

      // Show context
      const ctx = document.getElementById('year-context');
      if (data.background || data.perspective) {
        ctx.style.display = 'block';
        ctx.innerHTML = `
          <h3>${year} 年背景</h3>
          ${data.background ? `<p><strong>商业环境：</strong>${data.background}</p>` : ''}
          ${data.perspective ? `<p><strong>王兴视角：</strong>${data.perspective}</p>` : ''}
        `;
      } else {
        ctx.style.display = 'none';
      }

      const container = document.getElementById('year-quotes');
      container.innerHTML = data.quotes.map((q, i) => `
        <div class="quote-item">
          <div class="quote-item-text">「${q.text}」</div>
          <div class="quote-item-meta" style="display:flex; justify-content:space-between; align-items:center;">
            <span>📅 ${q.date}</span>
            <button class="copy-btn" onclick="copyQuote(this.closest('.quote-item').querySelector('.quote-item-text').textContent, this)">复制</button>
          </div>
        </div>
      `).join('');
    }

    loadData();
  </script>
</body>
</html>
