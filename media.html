  <script>
    // Media data (168 items)
    const mediaData = {"books": [{"name": "中庸", "title": "《中庸》", "quote_count": 5, "time_distribution": "", "quotes": [{"text": "L先生说，读了《新约》还应该读《旧约》，就像了读了《大学》之后 还应该读《中庸》，不然可能出现格局很大但是境界上不去的情况。", "date": "2019-06-07 11:44"}, {"text": "「撸起袖子加油干」完全符合习大大母校清华的校训「行胜于言」。 哈哈哈，你们这么说考虑过清华生的感受吗？ 一说「博学 审问 慎思 明辨 笃行」，好多人@ 我说这是中山大学校 训 。对我来说，更有意义的是，这出自《中庸》。", "date": "2017-04-07 11:52"}, {"text": "一说「博学 审问 慎思 明辨 笃行」，好多人@ 我说这是中山大学校 训 。对我来说，更有意义的是，这出自《中庸》。", "date": "2017-04-07 11:43"}, {"text": "《中庸》里说「博学之，审问之，慎思之，明辨之，笃行之」，其中 「笃」这个字最有意思。", "date": "2016-08-01 12:00"}, {"text": "今天学到了：“知耻近乎勇”出自《中庸》，前面两句是“好学近乎知， 力行近乎仁”。这两句也很棒啊，特别是“好学近乎知”，非常适用于现 在这个信息爆炸、知识结构需要快速更新升级的时代。老祖宗的智慧 真不是盖的。", "date": "2012-11-01 18:53"}]}, {"name": "活在当下", "title": "《活在当下》", "quote_count": 5, "time_distribution": "", "quotes": [{"text": "刚发现这首歌开头的旋律很像 Iggy Pop 的《Nazi Girlfriend》，但 是提速了。 黄秋生的那首《活在当下》词曲俱佳。最近听 了很多遍，觉得有一种超越日常的忧伤。这哥们是不是信基督啊？", "date": "2017-08-05 18:19"}, {"text": "你听了吗？还是看了歌名就评论？这歌让我想起伯格曼的电影。 这不是应该信佛吗？基督徒是活在天父那里啊 兴 黄秋生的那首《活在当下》词曲俱佳。最近听了很多遍，觉得有一 种超越日常的忧伤。这哥们是不是信基督啊？", "date": "2017-03-24 13:09"}, {"text": "不是同一首。 夕爷填的词。原唱应该是许志安。 黄秋生的那首《活在当下》词曲俱佳。最近听了很多遍，觉得有一种 超越日常的忧伤。这哥们是不是信基督啊？", "date": "2017-03-24 12:52"}, {"text": "黄秋生的那首《活在当下》词曲俱佳。最近听了很多遍，觉得有一种 超越日常的忧伤。这哥们是不是信基督啊？", "date": "2017-03-24 12:45"}, {"text": "《活在当下》的歌词让我进一步刷新了对黄秋生的认识。", "date": "2017-03-15 10:17"}]}, {"name": "人类简史", "title": "《人类简史》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "《人类简史》这本书很实用，至少可以用来把人分成几类：没听过这 本书的，听过但没读过的，读了大开眼界觉得特别好的，知道书中几 个主要想法的源起并能指出此书局限性的……", "date": "2017-05-28 18:33"}, {"text": "发现爸爸居然有一本《人类简史》。他说是在手机上从当当买的。", "date": "2017-03-19 19:59"}, {"text": "这个vc的书架有点意思，除了畅销书《人类简史》和《鞋狗》等，还 有这些书。", "date": "2017-02-10 15:06"}, {"text": "如果没读《人类简史》这本书，我不知道标致汽车的logo竟有如此深 意。", "date": "2016-01-31 01:53"}]}, {"name": "文明", "title": "《文明》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "我小时候最爱的游戏《文明》有两种「赢」的方式，一种是灭掉其他 文明统一地球，另一种是率先成功发射飞往半人马座的宇宙飞船。两 种打法在游戏的前90%是看不出差别的。", "date": "2018-11-02 09:12"}, {"text": "维基百科上说，郑和从泉州驶往东非的海上航线早在汉朝就开拓出来 了。以我玩《文明》所获取的知识来判断，这还是很惊人的。有人能 推荐一本关于郑和的靠谱的书吗？", "date": "2016-05-06 00:31"}, {"text": "到处都是阅兵彩排的图文信息，这再次让我想起了小时候玩的游戏 《文明》：当你的文明发展到一定地步，如果你选择了某种体制，那 就需要花费不低的成本定期建设宏伟的工程或举行隆重的仪式，以增 强你那个文明的稳定性。", "date": "2015-08-23 11:12"}, {"text": "@ qinyf 新概念英语？好遥远的事啊。我只读完了二。还是从游戏和 技术文档里学英文更有动力。中学时玩的经典游戏《文明》对我学英 语帮助极大。", "date": "2007-08-09 21:17"}]}, {"name": "老人与海", "title": "《老人与海》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "后者写出了一个时代以及其中的阶级和人性，但前者的主题更普世更 永恒。 海明威的《老人与海》和菲茨杰拉德的《了不起的 盖茨比》我都读过不止一遍。目前我觉得后者更打动我，但我有种预 感，十年、二十年或者三十年后，我有可能会变得更喜欢前者。", "date": "2020-01-15 13:19"}, {"text": "有什么书/作品我中英文都读过？目前只想到《老人与海》。", "date": "2017-08-05 18:40"}, {"text": "据说，海明威当时的太太读完《老人与海》的手稿后，热泪盈眶的对 他说：「恩尼，我原谅你以往犯过的所有错误，以及你将来可能犯的 任何错误。」我越来越觉得，科恩的《Hallelujah》也属于这种神级作 品。", "date": "2017-03-22 23:20"}, {"text": "海明威的《老人与海》和菲茨杰拉德的《了不起的盖茨比》我都读过 不止一遍。目前我觉得后者更打动我，但我有种预感，十年、二十年 或者三十年后，我有可能会变得更喜欢前者。", "date": "2016-12-09 00:38"}]}, {"name": "西游记", "title": "《西游记》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "打算重读《西游记》。", "date": "2015-09-26 00:22"}, {"text": "读《西游记》时小学还没毕业，不仅欣赏不了其中的诗 词，也体会不到结尾处的精妙。按说历经千辛万苦到西天见了佛祖理 想主义经受住考验就该圆满了吧，可面对阿傩迦叶索贿他们选择妥 协。# 此中有深意欲辩已忘言 #", "date": "2015-01-05 09:35"}, {"text": "打算重读《西游记》。", "date": "2012-11-26 19:34"}, {"text": "小时候，我不知道勇敢和坚持有多么难得，所以我看《西游记》没有 什么感觉。", "date": "2007-08-08 00:14"}]}, {"name": "三体", "title": "《三体》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "刘宇昆在把刘慈欣的《三体》译成英文时把「智子」已成为sophon。 这个翻译很棒。", "date": "2019-07-27 11:09"}, {"text": "赞行动力！我只是说了还没做呢。 去豆瓣上购了昨天@ 王 兴 同学推荐的《三体》，还有我超级粉的徐皓峰《大日坛城》", "date": "2010-12-09 11:56"}, {"text": "看了饭否上这么多朋友的推荐，我打算也读一下《三体》。", "date": "2010-12-08 13:27"}]}, {"name": "格调", "title": "《格调》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "@ quux @ gravity0 《格调》应该更早就有中译本了吧？我记得我大 概是中学的时候在我爸的书架上看到过，但当时我很不屑，只是翻了 翻，没读完。", "date": "2013-07-02 16:24"}, {"text": "《格调》是翻译美国版《Class》。更早一些还有英国版《Class》，逼 格更高。 《格调》一书05年读过，逼格似乎有点高。转 @ 王兴 推荐《格调》一书。英文就叫《Class》，中文不好意思直译 成阶级。 英国研究发现，活着不仅要拼爹而且要拼爷： 统计表明…", "date": "2013-07-02 13:21"}, {"text": "推荐《格调》一书。英文就叫《Class》，中文不好意思直译成阶级。 英国研究发现，活着不仅要拼爹而且要拼爷：统计表明 父母祖父母都是较高社会经济地位，80%的人成年以后还能在这个阶 层。而祖父母穷父母一辈奋斗成功者，子女只有 61% 的人成年以后仍 处这个阶层。", "date": "2013-07-02 12:55"}]}, {"name": "棋王", "title": "《棋王》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "小说是阿城写的，电影是梁家辉演的，片头用了罗大佑那首歌。 谢园的吗？ 《棋王》电影、《棋王》小说和罗大 佑的《爱人同志》这首歌都给我留下深刻印象。", "date": "2017-11-07 23:26"}, {"text": "《棋王》电影、《棋王》小说和罗大佑的《爱人同志》这首歌都给我 留下深刻印象。", "date": "2017-11-07 23:15"}, {"text": "俩月前重读王小波的《黄金时代》，感觉比十几年前年少时读多懂了 一些。于是，昨晚把十几年前曾震撼过我的电影梁家辉版《棋王》重 看了一遍。总体来说并不算精致上乘的电影，但那个特殊年代总能带 来一些触动。光是片头那些文革场景和罗大佑的《爱人同志》就值得 推荐给很多比我更年轻的人。", "date": "2012-02-26 14:24"}]}, {"name": "浪潮之巅", "title": "《浪潮之巅》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "按《浪潮之巅》吴军博士的说法，微软当年崛起靠的也 是商业模式而非技术。它之前的 IBM 和苹果捆绑硬软件，利润和扩张 速度就不如单买软件的模式好。决定战争胜负的往往是战略，而事后 为方便大家理解，往往会突出战术的巧妙和英雄的勇武。", "date": "2016-09-02 18:41"}, {"text": "我没看过《浪潮之巅》这本书，但从吴军老师今天的演讲和他回答我 提问的内容来看，他对细节和深度的品质要求…", "date": "2012-03-20 21:46"}, {"text": "听吴军老师做《浪潮之巅》的演讲。", "date": "2012-03-20 20:09"}]}, {"name": "爱人同志", "title": "《爱人同志》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "小说是阿城写的，电影是梁家辉演的，片头用了罗大佑那首歌。 谢园的吗？ 《棋王》电影、《棋王》小说和罗大 佑的《爱人同志》这首歌都给我留下深刻印象。", "date": "2017-11-07 23:26"}, {"text": "《棋王》电影、《棋王》小说和罗大佑的《爱人同志》这首歌都给我 留下深刻印象。", "date": "2017-11-07 23:15"}, {"text": "俩月前重读王小波的《黄金时代》，感觉比十几年前年少时读多懂了 一些。于是，昨晚把十几年前曾震撼过我的电影梁家辉版《棋王》重 看了一遍。总体来说并不算精致上乘的电影，但那个特殊年代总能带 来一些触动。光是片头那些文革场景和罗大佑的《爱人同志》就值得 推荐给很多比我更年轻的人。", "date": "2012-02-26 14:24"}]}, {"name": "等待戈多", "title": "《等待戈多》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "是的，例如那个先锋戏剧《等待戈多》的名字里到底是「戈多」还是 「多戈」，对我来说很难记，但是英文名 Godot 就好记很多。 外国的人名，应当直接记忆外文名。音译的中文名字没有意义。", "date": "2019-03-14 16:33"}, {"text": "《歌剧魅影》也属于我愿意再看的剧。 《等待戈多》我大 概不会去看第二遍了，《恋爱犀牛》或许还可以。", "date": "2017-03-14 22:10"}, {"text": "《等待戈多》我大概不会去看第二遍了，《恋爱犀牛》或许还可以。", "date": "2017-03-13 18:30"}]}, {"n 30 23:35"}, {"text": "不知怎的突然想起诸葛亮的「安居平五路」。我只知道小说《三国演 义》里对这段故事的描写，不知道史书《三国志》里是怎么说的。", "date": "2015-11-27 23:39"}]}, {"name": "世界上最伟大的推销员", "title": "《世界上最伟大的推销员》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "跟卖车的那个吉拉德不是同一本书。 我的那本上面 是吉拉德头像 \u0000还有视频难道不是古典余世维一类吗 @ 王兴 上了 高铁坐下来，发现左手边坐了一个上进青年：小桌板上放着一串佛珠 和一本《世界上最伟大的推销员》，封面上那金光灿灿的金字塔我看 着非常眼熟", "date": "2016-09-04 20:44"}, {"text": "上了高铁坐下来，发现左手边坐了一个上进青年：小桌板上放着一串 佛珠和一本《世界上最伟大的推销员》，封面上那金光灿灿的金字塔 我看着非常眼熟，二十年都没有变，不愧是经典畅销书。然后，他掏 出手机开始放马云演讲视频……", "date": "2016-09-04 17:05"}]}, {"name": "人类群星闪耀时", "title": "《人类群星闪耀时》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "茨威格同志，请不要轻易暴露自己。 哦，记下了。 如果茨威格要写新版《人类群星闪耀时》，2016年秋孙正义初次 见沙特王子 MBS 那一个小时的会可以作为备选。", "date": "2019-06-24 09:46"}, {"text": "如果茨威格要写新版《人类群星闪耀时》，2016年秋孙正义初次见沙 特王子 MBS 那一个小时的会可以作为备选。", "date": "2019-06-24 04:29"}]}, {"name": "国富论", "title": "《国富论》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "真正的大牛研究的都是核心问题，从论文或书的标题就可以看出来， 例如亚当斯密的《国富论》。 「回顾二战后的几十年，穷 国变富只有两条路，一是给富国干活（出口），而是祖上积德（例如 地下有油）」，这真是我听过的最冷酷无情的总结。", "date": "2016-10-28 16:42"}, {"text": "@ 远骋 在看《国富论》之前你看过某本《经济学》教程了吗？", "date": "2009-02-24 22:00"}]}, {"name": "墓碑", "title": "《墓碑》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "@ 申音 《墓碑》那书我前阵子在网上看到过全本下载，当时我一看 那么长就没碰。没想到你评价这么高", "date": "2009-04-14 22:19"}, {"text": "@ 申音 你说的《墓碑》是讲中国六十年代的那本书吗？", "date": "2009-04-14 22:08"}]}, {"name": "奇点临近", "title": "《奇点临近》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "-_-！ 下班路上看《奇点临近》，各种大脑小脑脊髓工作 生长机理，看得我好想吃脑花……", "date": "2016-07-05 22:46"}, {"text": "库茨魏尔写的《奇点临近》。 @ 王兴 求书名：你8号北 京会议上提到的书的全名是啥来着，没听清，讲科技发展的那本。", "date": "2013-12-10 09:39"}]}, {"name": "小王子", "title": "《小王子》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "我始终认为一个人可以很天真简单的活下去，必是身边无 数人用更大的代价守护而来的。——《小王子》", "date": "2015-10-21 13:10"}, {"text": "《小王子》拍成电影了，坐等2015年上 映，看了预告片心都化了。", "date": "2014-12-19 01:53"}]}, {"name": "数字化生存", "title": "《数字化生存》", "quote_count": 2 掉了还是我当年不懂 事。", "date": "2017-04-12 09:21"}, {"text": "今天去看了《云中行走》。这属于那种一定要去电影院看的电影。一 句话描述：这是我看过的让我手心出汗最多的电影！BTW，导演是 《阿甘正传》和《荒岛余生》的导演。", "date": "2016-01-23 21:56"}, {"text": "越来越觉得《低俗小说》牛逼。跟同年拍摄的《阿甘正传》和《肖申 克救赎》不一样，《低》并不试图讲什么人生大道理，但就是“好看”！ 我觉得不管第几遍看《低》我都不会无聊走神，因为它做到了：丰 富、精彩、高潮迭起但又不是简单重复⋯⋯", "date": "2011-12-12 12:26"}, {"text": "这个电影频道居然放完《阿甘正传》就接着放《肖申克的救赎》，再 接下来不会放《低俗小说》吧？我不奉陪了", "date": "2009-01-26 23:51"}]}, {"name": "低俗小说", "title": "《低俗小说》", "quote_count": 5, "time_distribution": "", "quotes": [{"text": "年纪越大越能理解，《阿甘正传》确实比同年的《肖申克救赎》或 《低俗小说》更代表美国主流价值观，难怪要赢那年奥斯卡。近二十 年前我初次看时都没注意到一开头阿甘老妈是靠把校长邀到家里来潜 规则才把弱智儿子送进学校，不知道是那段被剪掉了还是我当年不懂 事。", "date": "2017-04-12 09:21"}, {"text": "《七武士》在我看来就属于顶级水准了。当年看的时候真是被震撼 了。类似的有《美国往事》和《低俗小说》。 @ 王兴 你 觉得七武士和哪些片属于类似水准？", "date": "2015-06-02 19:00"}, {"text": "对了，《低俗小说》里还有迄今为止我看过的所有电影里最骚的舞 蹈，屈伏塔和乌玛瑟曼对舞那段。", "date": "2011-12-12 13:22"}, {"text": "越来越觉得《低俗小说》牛逼。跟同年拍摄的《阿甘正传》和《肖申 克救赎》不一样，《低》并不试图讲什么人生大道理，但就是“好看”！ 我觉得不管第几遍看《低》我都不会无聊走神，因为它做到了：丰 富、精彩、高潮迭起但又不是简单重复⋯⋯", "date": "2011-12-12 12:26"}, {"text": "这个电影频道居然放完《阿甘正传》就接着放《肖申克的救赎》，再 接下来不会放《低俗小说》吧？我不奉陪了", "date": "2009-01-26 23:51"}]}, {"name": "歌剧魅影", "title": "《歌剧魅影》", "quote_count": 5, "time_distribution": "", "quotes": [{"text": "只要有一架钢琴伴奏，一对男女对唱《歌剧魅影》主题曲确实是音乐 酒吧里快速拉升气氛同时提升逼格的有效办法。雅俗共赏。", "date": "2019-09-06 00:32"}, {"text": "《歌剧魅影》有什么更深一层的含义吗？", "date": "2017-12-12 12:28"}, {"text": "看完《歌剧魅影》，爸爸又跟我回忆起他小时候：那时爷爷是我们本 地剧团的编剧兼导演，每天晚上演出时都把爸爸安排在前排，希望他 能耳濡目染学一些，可怜爸爸那时正是十二三岁的多动少年，白天各 种折腾，到了晚上坐在那里一小会儿就睡着了，只记得每次被剧中一 声响锣从梦里惊醒…", "date": "2017-10-07 07:09"}, {"text": "《歌剧魅影》也属于我愿意再看的剧。 《等待戈多》我大 概不会去看第二遍了，《恋爱犀牛》或许还可以。", "date": "2017-03-14 22:10"}, {"text": "在QQ音乐里听了大半天各版本的《歌剧魅影》，男声都不够霸气。", "date": "2017-03-01 14:47"}]}, {"name": "阿拉伯的劳伦斯", "title": "《阿拉伯的劳伦斯》", "quote_count": 5, "time_distribution": "", "quotes": [{"text": "是为了不撞上无辜的行人而选择了牺牲自己。这才是完整的大片开 头。 侠盗飞车五里面没有地图快速移动，两地之间最快 的交通工具是摩托车，但也危险，摔死复活还要扣五千块钱。想起 《阿拉伯的劳伦斯》开场，这哥们身经百战活了下来，硬是自己骑摩 托摔死的。", "date": "2017-04-18 15:35"}, {"text": "去年重看《阿拉伯的劳伦斯》，很多场景现在历历在目，例如，阿拉 伯酋长（或是亲王）骑在马上对前来袭击营地的奥斯曼帝国轰炸机徒 劳的挥舞阿拉伯弯刀。", "date": "2017-04-18 15:21"}, {"text": "The desert has dried up more blood than you could imagine. 《阿拉伯的劳伦斯》里阿拉伯酋长对劳伦斯这么说。", "date": "2017-01-04 23:54"}, {"text": "任我再努力回忆，这电影里似乎只出现两次女人，一是男人出征时在 道路两旁石壁上发出奇怪的呜呜声，二是残垣断壁里刚被奸杀完似乎 尸首还没凉。 时隔十六年重看《阿拉伯的劳伦斯》。对我 来说完全就像一部新片。看到大概三分之二时想起了当年的观后感： 这是我看过的人最多但女人最少的电影。", "date": "2017-01-02 03:20"}, {"text": "时隔十六年重看《阿拉伯的劳伦斯》。对我来说完全就像一部新片。 看到大概三分之二时想起了当年的观后感：这是我看过的人最多但女 人最少的电影。", "date": "2017-01-01 17:26"}]}, {"name": "变形金刚2", "title": "《变形金刚2》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "对@ 申音 的《变形金刚2》简评很有同感：“机器人打群架眼花缭乱， 几乎认不出谁是谁”。我昨晚也看得很晕，觉得自己老了。", "date": "2009-06-24 21:40"}, {"text": "说实话，《变形金刚2》没有我期待的那么激动人心。看来我现在确实 是喜欢剧情片胜过场面片。", "date": "2009-06-24 02:55"}, {"text": "聚在华星大厅等着看《变形金刚2》的人群里美女密度相当高啊", "date": "2009-06-23 23:49"}, {"text": "明晚十二点去华星看《变形金刚2》！嘢，好几个月没去电影院了。", "date": "2009-06-22 20:42"}]}, {"name": "星球大战", "title": "《星球大战》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "囧，搞混了。那么，我把卢卡斯排在这二人之上。 可是星 球大战不是乔治卢卡斯导演的么 很长一段时间里，我觉得 卡梅隆是比斯皮尔伯格更牛的导演。最近越来越觉得我原先低估了 《星球大战》的经典程度。卡梅隆没有哪部电影在题材和宏观结构上 达到了这个高度。", "date": "2018-05-24 00:21"}, {"text": "很长一段时间里，我觉得卡梅隆是比斯皮尔伯格更牛的导演。最近越 来越觉得我原先低估了《星球大战》的经典程度。卡梅隆没有哪部电 影在题材和宏观结构上达到了这个高度。", "date": "2018-05-24 00:07"}, {"text": "国内的一些活动在发言者上台时喜欢放《星球大战》的那段音乐，虽 然很激昂，但对我来说有些额外的困扰。", "date": "2017-05-16 11:07"}, {"text": "@ chnzhl 只是电影《星球大战》里的一句装逼台词罢了。", "date": "2010-12-08 10:07"}]}, {"name": "桃姐", "title": "《桃姐》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "在《云图》这部电影里我看到了《怒海争锋》《桃姐》《黑客帝国》 《被解放的姜戈》《普罗米修斯》《环形使者》《人猿星球之猿人崛 起》等诸片的元素，但就是没看懂导演想说什么。不过，还是蛮好看 的。", "date": "2013-01-26 01:12"}, {"text": "《桃姐》因为其现实题材，还是值得一看，但不宜期望值过高。总体 偏沉重，可以带老婆看，不宜带新交的女朋友看，也不宜带老妈看。", "date": "2012-03-11 11:17"}, {"text": "《桃姐》并不是制作精良的电影，而是胜在题材。如果拿电脑打比 方，《桃姐》不是MacBook，也不是鼎盛时期的ThinkPad，甚至算不 上是索尼的VAIO，而更像是华硕的EeePC。呃，如果你能看明白这个 类比，那你多半是一个既不普通也不二逼的IT青年。", "date": "2012-03-11 11:01"}, {"text": "《桃姐》开场第一个镜头就令我有些失望：坐在候车室里的刘德华起 身一拎拉杆箱，那箱子轻飘飘的样子，明显就是空的嘛！细节不真 实。拜托，演戏也要有专业精神啊！", "date": "2012-03-11 10:31"}]}, {"name": "比利林恩的中场战事", "title": "《比利林恩的中场战事》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "《比利林恩的中场战事》小说一开头有个细节让我印象深刻（不记得 李安的电影里有没有表现）：小伙子因为在万里之外的伊拉克战场浴 血奋战而被当做英雄送回国在感恩节的橄榄球大赛上亮相。他就出生 在达拉斯以西八十英里的地方，但是他从小到大别说进过城里这个德 州体育场，他连见都没见过。", "date": "2018-11-18 18:41"}, {"text": "李安拍的《比利林恩的中场战事》里那棵树真是让我过目难忘。如果 有一天我真的坚持把这本小说读完了，大概有一半是为了看看它在文 字里长什么样。", "date": "2017-05-28 21:15"}, {"text": "为什么《比利林恩的中场战事》不太受欢迎？就因为这部电影重在真 实而非美好吗？", "date": "2016-11-26 00:55"}, {"text": "李安的新片《比利林恩的中场战事》值得看。虽然我看的是传说中的 120帧版本，但如果没人告诉我，我并不会注意到这种技术细节。相 反，吸引我的是这部电影让我从另一个角度理解战争和社会，就想当 年斯皮尔伯格的《拯救大兵瑞恩》让我第一次知道战争片不一定是解 放战争片那样的。", "date": "2016-11-26 00:45"}]}, {"name": "钢锯岭", "title": "《钢锯岭》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "这么牛！@ 对着弹 不能再真实了，旁边一小男孩儿直接看吐了，是 真的在吐，嗷嗷的，感觉他爹心真大，带孩子来看这片子。 美国某老兵协会组织观影，老兵们纷纷觉得很真实。 好像熟人朋友们多数都夸《钢锯岭》…在三十几年前对越战争中 当过狙击手的大哥说「不真实」。", "date": "2016-12-20 17:44"}, {"text": "美国某老兵协会组织观影，老兵们纷纷觉得很真实。 好像熟人朋友们多数都夸《钢锯岭》，至少说场面震撼。只有一 个在三十几年前对越战争中当过狙击手的大哥说「不真实」。", "date": "2016-12-19 16:55"}, {"text": "好像熟人朋友们多数都夸《钢锯岭》，至少说场面震撼。只有一个在 三十几年前对越战争中当过狙击手的大哥说「不真实」。", "date": "2016-12-19 15:06"}, {"text": "好像最近战争片又多起来了，李安拍了《比利林恩》，吉布森拍了 《钢锯岭》，诺兰也拍了《敦克尔刻》。", "date": "2016-12-13 15:01"}]}, {"name": "闯入者", "title": "《闯入者》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "不，译成「红色失忆」可能比「红色健忘症」更好一点。 《闯入者》的英文片名叫\"Red Amnesia\"，译成中文是「红色健忘 症」。这俩片名都和内容蛮搭的。", "date": "2015-05-09 15:12"}, {"text": "《闯入者》的英文片名叫\"Red Amnesia\"，译成中文是「红色健忘 症」。这俩片名都和内容蛮搭的。", "date": "2015-05-09 15:10"}, {"text": "惭愧，现在还不能。 我这儿影院不给排，这事儿村长能 管么？ 《闯入者》这电影看的时候有点烦（到最后20分钟 才大概明白怎么回事），但看完还是挺令人回味的。于是决定把我昨 晚在猫眼上给它打的分从7分提升到8分。", "date": "2015-05-09 14:25"}, {"text": "《闯入者》这片其实还是值得看的，但是得耐心的看到最后，而且确 实比较沉重。票房惨淡我也完全可以理解，确实跟《速7》或《王牌特 工》完全不是一个路数的电影。", "date": "2015-05-09 00:44"}]}, {"name": "Moneyball", "title": "《Moneyball》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "小胖子凭借这个片获得那年的奥斯卡最佳男配奖 兴 《Moneyball》这部电影里给我最深刻印象的场景和比赛无关，和 那个传奇教练也无关，而是和那个耶鲁小胖子助理有关。", "date": "2018-05-11 12:29"}, {"text": "《Moneyball》这部电影里给我最深刻印象的场景和比赛无关，和那个 传奇教练也无关，而是和那个耶鲁小胖子助理有关。", "date": "2018-05-11 12:14"}, {"text": "打算看一下布拉德皮特的新片《Moneyball》。据说这电影讲的其实不 是棒球，而是数据！", "date": "2012-02-09 13:33"}]}, {"name": "七武士", "title": "《七武士》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "伟大的电影作品总是能让人不经意间想起她的某个场景，例如我今早 醒来后想到的《七武士》。", "date": "2018-08-19 08:11"}, {"text": "《七武士》在我看来就属于顶级水准了。当年看的时候真是被震撼 了。类似的有《美国往事》和《低俗小说》。 @ 王兴 你 觉得七武士和哪些片属于类似水准？", "date": "2015-06-02 19:00"}, {"text": "有什么中国电影达到或至少接近了《七武士》的水准吗？", "date": "2015-06-02 12:33"}]}, {"name": "云图", "title": "《云图》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "突然想起电影《云图》里在海滩上烤火讲故事的那一幕。", "date": "2017-09-03 02:44"}, {"text": "《云图》只要能吸引《阿凡达》一半的观众，就很有希望成为史上票 房最高的电影，因为一般至少得看两遍才能看懂。", "date": "2013-01-26 01:23"}, {"text": "在《云图》这部电影里我看到了《怒海争锋》《桃姐》《黑客帝国》 《被解放的姜戈》《普罗米修斯》《环形使者》《人猿星球之猿人崛 起》等诸片的元素，但就是没看懂导演想说什么。不过，还是蛮好看 的。", "date": "2013-01-26 01:12"}]}, {"name": "叶问", "title": "《叶问》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "@ underland 我觉得有关系。如果不考虑爱国情绪，《叶问》真是一 部特一般的电影啊。", "date": "2009-01-03 11:10"}, {"text": "开始看《叶问》，谢谢一鸣送的票。预计会在电影中度过午夜，所以 现在就和各位朋友说一声“新年快乐”", "date": "2008-12-31 22:53"}, {"text": "我真土，今天才知道Ip Man是《叶问》的英文名。我还以为真是某部 和Iron Man一样的科幻片呢。被张亮骗了-_-!", "date": "2008-12-30 13:31"}]}, {"name": "喜剧之王", "title": "《喜剧之王》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "在思考「有什么一部电影把一本书变火的例子？」这个问题时，我第 一个想到的是《喜剧之王》和《演员的自我修养》……", "date": "2018-05-12 19:58"}, {"text": "在吃节目组提供的盒饭时，我想到了《喜剧之王》里的便当…", "date": "2009-07-01 18:48"}, {"text": "像《喜剧之王》里的周星驰一样大喊”努力奋斗～～～“", "date": "2007-05-28 11:43"}]}, {"name": "大鱼海棠", "title": "《大鱼海棠》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "前几天在飞机上终于把《大鱼海棠》看了。创作者放飞自我，讲了一 个任性和虐爱的故事。但是整个电影的完成度不算太高。 《大鱼海棠》这部电影的口碑明显两极分化。这应该算是件好事。", "date": "2017-08-06 03:03"}, {"text": "《大圣归来》、《大鱼海棠》、《大护法》，国产动画片似乎都喜欢 以大命名。", "date": tion": "", "quotes": []}], "poems": [{"name": "琵琶行", "title": "《琵琶行》", "quote_count": 4, "time_distribution": "", "quotes": [{"text": "今天午饭后的无聊活动是在地图上找了一下从白居易写《琵琶行》的 浔阳/江州（今天的九江）到「浮梁」（景德镇下的一个县）买茶去的 水路怎么走。目测是走鄱阳湖转昌江，不走长江。", "date": "2017-07-11 13:09"}, {"text": "原来《琵琶行》里的浔阳、江州就是今天的九江，我还不曾去过。", "date": "2016-08-17 00:44"}, {"text": "突然心血来潮把《琵琶行》翻出来重读一遍。原来淘品牌「裂帛」出 自这里。", "date": "2016-08-17 00:39"}, {"text": "无意中想起「添酒回灯重开宴」，于是把《琵琶行》翻出来重读了一 遍。", "date": "2016-01-22 20:28"}]}, {"name": "临安春雨初霁", "title": "《临安春雨初霁》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "重温陆游的《临安春雨初霁》「世味年来薄似纱，谁令骑马客京华？ 小楼一夜听春雨，深巷明朝卖杏花。矮纸斜行闲作草，晴窗细乳戏分 茶。素衣莫起风尘叹，犹及清明可到家。」近千年过去了，人们不骑 马改骑车了，闲下来不写字改玩手机了，但很多感觉其实都没变。", "date": "2018-04-05 13:27"}, {"text": "真是惭愧，发了一条关于《临安春雨初霁》的消息，被同学们挑出不 止一处错。特录全文于下：世味年来薄似纱，谁令骑马客京华？小楼 一夜听春雨，深巷明朝卖杏花。矮纸斜行闲作草，晴窗细乳戏分茶。 素衣莫起风尘叹，犹及清明可到家。", "date": "2016-07-28 20:22"}, {"text": "陆游的《临安春雨初霁》真是神作，触点特多。我最早当然是读到 「小楼一夜听春雨，深巷明早卖杏花」；后来是有人讲我国古代已有 类似花式咖啡的茶艺时引用了「晴窗细乳细分茶」；这回是看到「世 味年来薄似纱，谁令骑马客京华」。", "date": "2016-07-28 17:45"}]}, {"name": "Shooting An Elephant", "title": "《Shooting An Elephant》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "又想起奥威尔的《Shooting An Elephant》。", "date": "2018-05-18 22:42"}, {"text": "没有什么外部力量可以阻止印度的崛起。这几天在这里，我时不时会 想起（出生在印度的）奥威尔以白人殖民者在缅甸殖民地为主题写的 《Shooting An Elephant》，那里面的隐喻给我留下深刻印象。", "date": "2018-02-27 02:39"}]}, {"name": "临洞庭湖赠张丞相", "title": "《临洞庭湖赠张丞相》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "孟浩然的《临洞庭湖赠张丞相》：八月湖水平， 涵虚混太清。 气蒸 云梦泽， 波撼岳阳城。 欲济无舟楫， 端居耻圣明。 坐观垂钓者， 徒有羡鱼情。", "date": "2014-11-15 09:13"}, {"text": "果然，孟浩然是农历八月写的这首《临洞庭湖赠张丞相》，所以才会 有「气蒸云梦泽」的感觉。而杜甫却是暮冬腊月来《登岳阳楼》，湖 边冷风一吹，可不是得「凭轩涕泗流」嘛。当然，全诗境界还是杜比 孟高得多。", "date": "2014-11-15 09:02"}]}, {"name": "将进酒", "title": "《将进酒》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "真是一张任性的专辑。黄秋生唱股市，唱楼市，唱dylan的blowin，唱 beyond的《海阔天空》，唱《将进酒》，唱徐志摩的《偶然》…… 转 @ 王兴 听了一张奇怪的黄秋生专辑，就叫《bad taste》。粤语里和 「大佬」对应的概念是「细佬」？", "date": "2017-03-15 09:59"}, {"text": "有比李白的《将进酒》更有气势的祝酒词吗？天才就是天才啊！", "date": "2015-12-28 00:34"}]}, {"name": "春日忆李白", "title": "《春日忆李白》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "杜甫老师夸人水平挺差劲的。《春日忆李白》这开头四句「白也诗无 敌，飘然思不群。清新庾开府，俊逸鲍参军」真的算是夸奖吗？我要 是李白，就直接跟他翻脸，还一起喝个啥酒啊。", "date": "2017-04-25 17:30"}, {"text": "《春日忆李白》：白也诗无敌，飘然思不群。清新庾开府，俊逸鲍参 军。渭北春天树，江东日暮云。何时一樽酒，重与细论文。-杜甫", "date": "2016-02-26 14:35"}]}, {"name": "永遇乐·京口北固亭怀古", "title": "《永遇乐·京口北固亭怀古》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "多谢指正！ 南乡子 辛弃疾大概是因为在镇江做 过官的缘故，似乎很喜欢北固亭这个地方。除了那首以「尚能饭否」 结尾的《永遇乐·京口北固亭怀古》，他还写了这首同样出名的《南算 子·登京口北固亭有怀》：何处望神州？满眼风光北固楼。千古兴亡多 少事？悠悠，不尽长江滚滚流！", "date": "2016-04-24 14:11"}, {"text": "辛弃疾大概是因为在镇江做过官的缘故，似乎很喜欢北固亭这个地 方。除了那首以「尚能饭否」结尾的《永遇乐·京口北固亭怀古》，他 还写了这首同样出名的《南算子·登京口北固亭有怀》：何处望神州？ 满眼风光北固楼。千古兴亡多少事？悠悠，不尽长江滚滚流！年少万 兜鍪，坐断东南战未休。天下英雄谁敌手？", "date": "2016-04-24 08:53"}]}, {"name": "独立宣言", "title": "《独立宣言》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "美国国庆日真是充满传奇花絮：杰斐逊起草的《独立宣言》发表于 1776年7月4日。五十年后，1826年7月4日，参与宣言签字、后来政见 水火不容、分别成为美国第二第三任总统的亚当斯和杰斐逊在同一天 去世，只隔几个小时，享年90和83岁。", "date": "2018-07-05 14:29"}, {"text": "转发：美国思想家、《独立宣言》思想奠基人之一的托马斯•潘恩：一 个人，如果极力宣扬他自己都不相信的东西，那他就是做好了干任何 坏事的准备。", "date": "2013-07-10 12:29"}]}, {"name": "登岳阳楼", "title": "《登岳阳楼》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "杜甫的《登岳阳楼》：昔闻洞庭水，今上岳阳楼。吴楚东南坼，乾坤 日夜浮。亲朋无一字，老病有孤舟。戎马关山北，凭轩涕泗流。", "date": "2014-11-15 09:12"}, {"text": "果然，孟浩然是农历八月写的这首《临洞庭湖赠张丞相》，所以才会 有「气蒸云梦泽」的感觉。而杜甫却是暮冬腊月来《登岳阳楼》，湖 边冷风一吹，可不是得「凭轩涕泗流」嘛。当然，全诗境界还是杜比 孟高得多。", "date": "2014-11-15 09:02"}]}, {"name": "结构工程名词", "title": "《结构工程名词》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "有专门讨论给各种汉字赋予Unicode编码的国际机 构，每年开两次会，biangbiang面未获通过。 砼 tóng 这 个字是1953年著名结构学家蔡方荫教授创造的，意思是混凝土，取 「人工石」三字的组合。1955年《结构工程名词》一书中，明确推 荐“砼”与“混", "date": "2017-08-21 15:19"}, {"text": "比造词更有趣的是造字。砼 tóng 这个字是1953年著名结构学家蔡方 荫教授创造的，意思是混凝土，取「人工石」三字的组合。1955年中 国科学院编译出版委员会“名词室”审定颁布的《结构工程名词》一书 中，明确推荐“砼”与“混凝土”一词并用。从此，“砼”被广泛采用于各类 建筑工程的书刊中", "date": "2017-08-21 12:03"}]}, {"name": "西塞山怀古", "title": "《西塞山怀古》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "《西塞山怀古》刘禹锡王濬楼船下益州，金陵王气黯然收。千寻铁锁 沉江底，一片降幡出石头。人世几回伤往事，山形依旧枕寒流。今逢 四海为家日，故垒萧萧芦荻秋。", "date": "2017-11-23 16:36"}, {"text": "刘禹锡的《西塞山怀古》：王浚楼船下益州，金陵王气黯然收。千寻 铁锁沉江底，一片降幡出石头。人世几回伤往事？山形依旧枕寒流。 今逢四海为家日，故垒萧萧芦荻秋。", "date": "2017-04-09 09:17"}]}, {"name": "陈东升：“摩根梦”不再", "title": "《陈东升：“摩根梦”不再》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "一个月前我推荐过《陈东升：“摩根梦”不再》这篇文章，觉得很有料。 http://is.gd/F06VdL 今天才知道有更多猛料作者没写出来，1996年陈 是拉着刚大学毕业的孔东梅（毛的外孙女）创办泰康人寿的，后来孔 成了陈的小三。", "date": "2012-05-05 00:21"}, {"text": "《陈东升：“摩根梦”不再》这篇文章值得一读。 http://is.gd/F06VdL", "date": "2012-04-06 11:14"}]}, {"name": "📜 诗文 索引", "title": "📜 诗文 索引", "quote_count": 0, "time_distribution": "", "quotes": []}], "others": [{"name": "清华大学章程", "title": "《清华大学章程》", "quote_count": 3, "time_distribution": "", "quotes": [{"text": "这五条作为对企业管理者的要求也很好。 清华从2017年起 全面推行大类招生培养和管理，纳入本科招生的所有专业将整合为16 大类。《清华大学章程》描述的人才培养目标是：健全人格、宽厚基 础、创新思维、全球视野和社会责任感。", "date": "2018-04-14 11:44"}, {"text": "清华的这个总结就属于好好说人话，而且让我看过一遍就能全部记 住。 清华从2017年起全面推行大类招生培养和管理，纳入 本科招生的所有专业将整合为16大类。《清华大学章程》描述的人才 培养目标是：健全人格、宽厚基础、创新思维、全球视野和社会责任 感。", "date": "2017-04-19 12:07"}, {"text": "清华从2017年起全面推行大类招生培养和管理，纳入本科招生的所有 专业将整合为16大类。《清华大学章程》描述的人才培养目标是：健 全人格、宽厚基础、创新思维、全球视野和社会责任感。", "date": "2017-04-19 11:48"}]}, {"name": "广场协议", "title": "《广场协议》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "从1945年二战结束到1985年签订《广场协议》，美国和日本的蜜月期 也正好是40年。", "date": "2019-12-11 22:51"}, {"text": "导致日本经济后来长期停滞不前的标志性事件是85年在美国胁迫下签 署了《广场协议》。我刚知道这协议并不是在哪个广场签的，而是在 曼哈顿的广场酒店 Plaza Hotel 签的。真正牛逼的酒店就是有这样的 历史事件来提升品牌价值。如果有某款著名鸡尾酒是在这个酒店发明 的，那就更有故事可说了。", "date": "2018-03-26 22:24"}]}, {"name": "杀人三叶草", "title": "《杀人三叶草》", "quote_count": 2, "time_distribution": "", "quotes": [{"text": "不同的中文译本用了不同的书名，也有叫三尖树的。英文书名是《The Day of the Triffids》，出版于1951年。 天哪，我也读 过，单行本。记得名字叫《三叶草在行动》。 想起了小时 候读过的科幻小说《杀人三叶草》。", "date": "2020-02-09 00:34"}, {"text": "想起了小时候读过的科幻小说《杀人三叶草》。", "date": "2020-02-08 19:39"}]}, {"name": "🗂 其他 索引", "title": "🗂 其他 索引", "quote_count": 0, "time_distribution": "", "quotes": []}]};

    function loadData() {
      updateStats();
      const params = new URLSearchParams(window.location.search);
      const type = params.get('type') || 'books';
      const typeToIndex = {'books':0, 'movies':1, 'songs':2, 'magazines':3, 'dramas':4, 'poems':5};
      const tabIndex = typeToIndex.get(type, 0);
      const tabs = document.querySelectorAll('.media-tab');
      if (tabs[tabIndex]) {
        switchTab(type, tabs[tabIndex]);
      }
    }
function updateStats() {
      document.getElementById('stat-books').textContent = mediaData.books?.length || 0;
      document.getElementById('stat-movies').textContent = mediaData.movies?.length || 0;
      document.getElementById('stat-songs').textContent = mediaData.songs?.length || 0;
      document.getElementById('stat-magazines').textContent = mediaData.magazines?.length || 0;

      document.getElementById('tab-books').textContent = mediaData.books?.length || 0;
      document.getElementById('tab-movies').textContent = mediaData.movies?.length || 0;
      document.getElementById('tab-songs').textContent = mediaData.songs?.length || 0;
      document.getElementById('tab-magazines').textContent = mediaData.magazines?.length || 0;
      document.getElementById('tab-dramas').textContent = mediaData.dramas?.length || 0;
      document.getElementById('tab-poems').textContent = mediaData.poems?.length || 0;
    }

    function switchTab(type, el) {
      document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGrid(type);
    }

    function renderGrid(type) {
      const items = mediaData[type] || [];
      const container = document.getElementById('media-content');

      if (items.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--color-mid-gray);">暂无数据</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="media-card" onclick="showMediaDetail('${type}', '${item.name.replace(/'/g, "\\'")}')">
          <div class="media-type">${getTypeLabel(type)}</div>
          <div class="media-title">${item.title}</div>
          <div class="media-meta">提及 ${item.quote_count} 次 ${item.time_distribution ? '· ' + item.time_distribution : ''}</div>
          ${item.quotes && item.quotes.length > 0 ? `
            <div class="quotes-preview">
              ${item.quotes.slice(0, 1).map(q => `
                <div class="quote-mini">「${q.text.slice(0, 80)}${q.text.length > 80 ? '...' : ''}」</div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function getTypeLabel(type) {
      const labels = {
        books: '书籍', movies: '影视', songs: '歌曲', magazines: '刊物', dramas: '剧集', poems: '诗文', others: '其他'
      };
      return labels[type] || type;
    }

    function showMediaDetail(type, name) {
      const items = mediaData[type] || [];
      const item = items.find(i => i.name === name);
      if (!item) return;

      const label = getTypeLabel(type);
      document.getElementById('modal-title').textContent = item.title;
      document.getElementById('modal-meta').textContent = `${label} · 提及 ${item.quote_count} 次`;
      document.getElementById('modal-quotes').innerHTML = item.quotes && item.quotes.length > 0
        ? item.quotes.map(q => `
          <div class="modal-quote">
            <div class="modal-quote-text">「${q.text}」</div>
            <div class="modal-quote-date">📅 ${q.date}</div>
          </div>
        `).join('')
        : '<p style="color:var(--color-mid-gray);">暂无语录</p>';

      document.getElementById('media-modal').style.display = 'flex';
    }

    document.getElementById('modal-close').onclick = () => {
      document.getElementById('media-modal').style.display = 'none';
    };
    document.getElementById('media-modal').onclick = (e) => {
      if (e.target === e.currentTarget) e.currentTarget.style.display = 'none';
    };

    loadData();
  </script>

  <!-- Detail Modal -->
  <div id="media-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; border-radius:16px; max-width:640px; width:100%; max-height:80vh; overflow:hidden; display:flex; flex-direction:column;">
      <div style="padding:24px 28px 16px; border-bottom:1px solid var(--color-light-gray); display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div id="modal-title" style="font-family:var(--font-heading); font-size:1.3rem; font-weight:600;"></div>
          <div id="modal-meta" style="color:var(--color-mid-gray); font-size:0.9rem; margin-top:4px;"></div>
        </div>
        <button id="modal-close" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--color-mid-gray); padding:0 0 0 16px;">✕</button>
      </div>
      <div id="modal-quotes" style="padding:20px 28px; overflow-y:auto; display:flex; flex-direction:column; gap:16px;"></div>
    </div>
  </div>
  <style>
    .modal-quote {
      background: var(--color-warm-bg);
      border-left: 3px solid var(--color-orange);
      padding: 14px 18px;
      border-radius: 0 8px 8px 0;
    }
    .modal-quote-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--color-dark);
      margin-bottom: 6px;
    }
    .modal-quote-date {
      font-size: 0.8rem;
      color: var(--color-mid-gray);
    }
    .media-card { cursor: pointer; }
  </style>
</body>
