<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书影歌刊 | 王兴饭否思想库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .media-tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      justify-content: center;
    }

    .media-tab {
      padding: 12px 24px;
      background: white;
      border: 2px solid var(--color-light-gray);
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .media-tab:hover, .media-tab.active {
      border-color: var(--color-orange);
      background: var(--color-orange);
      color: white;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .media-card {
      background: white;
      border: 1px solid var(--color-light-gray);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .media-card:hover {
      border-color: var(--color-orange);
      box-shadow: var(--shadow-soft);
      transform: translateY(-2px);
    }

    .media-type {
      font-size: 0.75rem;
      color: var(--color-orange);
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .media-title {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .media-meta {
      color: var(--color-mid-gray);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .media-desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--color-dark);
      margin-bottom: 16px;
    }

    .quotes-preview {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--color-light-gray);
    }

    .quote-mini {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--color-mid-gray);
      padding: 8px;
      background: var(--color-warm-bg);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .quote-mini:last-child {
      margin-bottom: 0;
    }

    .count-badge {
      display: inline-block;
      background: var(--color-warm-bg);
      color: var(--color-orange);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">王兴思想库</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="corpus.html">语料库</a></li>
        <li><a href="years.html">年度</a></li>
        <li><a href="companies.html">公司</a></li>
        <li><a href="people.html">人物</a></li>
        <li><a href="models.html">思维</a></li>
        <li><a href="media.html" class="active">书影</a></li>
        <li><a href="quotes.html">金句</a></li>
        <li><a href="search.html">搜索</a></li>
      </ul>
    </div>
  </nav>

  <div class="detail-header">
    <div class="container">
      <h1>书影歌刊</h1>
      <p style="color: var(--color-mid-gray); margin-top: 0.5rem;">王兴提及的文化作品：书籍、影视、歌曲、刊物</p>
      <div class="detail-meta" style="margin-top: 20px;">
        <div class="detail-meta-item"><div class="detail-meta-label">书籍</div><div class="detail-meta-value" id="stat-books">-</div></div>
        <div class="detail-meta-item"><div class="detail-meta-label">影视</div><div class="detail-meta-value" id="stat-movies">-</div></div>
        <div class="detail-meta-item"><div class="detail-meta-label">歌曲</div><div class="detail-meta-value" id="stat-songs">-</div></div>
        <div class="detail-meta-item"><div class="detail-meta-label">刊物</div><div class="detail-meta-value" id="stat-magazines">-</div></div>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top: 40px;">
    <div class="container">
      <div class="media-tabs">
        <div class="media-tab active" onclick="switchTab('books', this)">📚 书籍 <span class="count-badge" id="tab-books"></span></div>
        <div class="media-tab" onclick="switchTab('movies', this)">🎬 影视 <span class="count-badge" id="tab-movies"></span></div>
        <div class="media-tab" onclick="switchTab('songs', this)">🎵 歌曲 <span class="count-badge" id="tab-songs"></span></div>
        <div class="media-tab" onclick="switchTab('magazines', this)">📰 刊物 <span class="count-badge" id="tab-magazines"></span></div>
        <div class="media-tab" onclick="switchTab('dramas', this)">📺 剧集 <span class="count-badge" id="tab-dramas"></span></div>
        <div class="media-tab" onclick="switchTab('poems', this)">✒️ 诗文 <span class="count-badge" id="tab-poems"></span></div>
      </div>

      <div class="media-grid" id="media-content"></div>
    </div>
  </section>

  <footer class="footer" style="margin-top: 60px;">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">王兴思想库</div>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="years.html">年度分析</a>
          <a href="models.html">思维模型</a>
          <a href="quotes.html">金句</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    let mediaData = {};

    async function loadData() {
      try {
        const res = await fetch('data/media-full.json');
        mediaData = await res.json();
        updateStats();
        switchTab('books', document.querySelector('.media-tab'));
      } catch (e) {
        console.error('Failed to load media data:', e);
      }
    }

    function updateStats() {
      document.getElementById('stat-books').textContent = mediaData.books?.length || 0;
      document.getElementById('stat-movies').textContent = mediaData.movies?.length || 0;
      document.getElementById('stat-songs').textContent = mediaData.songs?.length || 0;
      document.getElementById('stat-magazines').textContent = mediaData.magazines?.length || 0;

      document.getElementById('tab-books').textContent = mediaData.books?.length || 0;
      document.getElementById('tab-movies').textContent = mediaData.movies?.length || 0;
      document.getElementById('tab-songs').textContent = mediaData.songs?.length || 0;
      document.getElementById('tab-magazines').textContent = mediaData.magazines?.length || 0;
      document.getElementById('tab-dramas').textContent = mediaData.dramas?.length || 0;
      document.getElementById('tab-poems').textContent = mediaData.poems?.length || 0;
    }

    function switchTab(type, el) {
      document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGrid(type);
    }

    function renderGrid(type) {
      const items = mediaData[type] || [];
      const container = document.getElementById('media-content');

      if (items.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--color-mid-gray);">暂无数据</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="media-card">
          <div class="media-type">${getTypeLabel(type)}</div>
          <div class="media-title">${item.title}</div>
          <div class="media-meta">提及 ${item.quote_count} 次 ${item.time_distribution ? '· ' + item.time_distribution : ''}</div>
          ${item.description ? `<div class="media-desc">${item.description}</div>` : ''}
          ${item.quotes && item.quotes.length > 0 ? `
            <div class="quotes-preview">
              ${item.quotes.slice(0, 2).map(q => `
                <div class="quote-mini">「${q.text.slice(0, 80)}...」</div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function getTypeLabel(type) {
      const labels = {
        books: '书籍', movies: '影视', songs: '歌曲', magazines: '刊物', dramas: '剧集', poems: '诗文', others: '其他'
      };
      return labels[type] || type;
    }

    loadData();
  </script>
</body>
</html>
