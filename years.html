<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年度分析 | 王兴饭否思想库</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .years-timeline {
      position: relative;
      padding-left: 40px;
    }

    .years-timeline::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--color-orange), var(--color-blue));
    }

    .year-item {
      position: relative;
      margin-bottom: 32px;
      padding: 24px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--color-light-gray);
      cursor: pointer;
      transition: all 0.3s;
    }

    .year-item:hover {
      border-color: var(--color-orange);
      box-shadow: 0 8px 32px rgba(217, 119, 87, 0.1);
      transform: translateX(8px);
    }

    .year-item::before {
      content: '';
      position: absolute;
      left: -34px;
      top: 28px;
      width: 16px;
      height: 16px;
      background: var(--color-orange);
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 2px var(--color-orange);
    }

    .year-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .year-title {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 600;
    }

    .year-count {
      background: var(--color-warm-bg);
      color: var(--color-orange);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .year-background {
      color: var(--color-mid-gray);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .year-dimensions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .year-dimension {
      padding: 4px 10px;
      background: var(--color-warm-bg);
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--color-dark);
    }

    .year-dimension-count {
      color: var(--color-orange);
      font-weight: 600;
    }

    .period-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      color: var(--color-orange);
      margin: 40px 0 20px -40px;
      padding-left: 40px;
      position: relative;
    }

    .period-title::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: var(--color-dark);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">王兴思想库</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="corpus.html">语料库</a></li>
        <li><a href="companies.html">公司档案</a></li>
        <li><a href="people.html">人物档案</a></li>
        <li><a href="search.html">搜索</a></li>
        <li><a href="models.html">思维模型</a></li>
        <li><a href="quotes.html">金句</a></li>
      </ul>
    </div>
  </nav>

  <!-- Header -->
  <div class="detail-header">
    <div class="container">
      <h1>年度商业分析</h1>
      <p style="color: var(--color-mid-gray); margin-top: 0.5rem;">
        2007-2021 十五年的商业环境与王兴思想演变
      </p>
      <div class="detail-meta" style="margin-top: 20px;">
        <div class="detail-meta-item">
          <div class="detail-meta-label">分析年份</div>
          <div class="detail-meta-value">15 年</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">时代划分</div>
          <div class="detail-meta-value">5 阶段</div>
        </div>
        <div class="detail-meta-item">
          <div class="detail-meta-label">核心维度</div>
          <div class="detail-meta-value">16 个</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <section class="section" style="padding-top: 40px;">
    <div class="container">
      <div class="years-timeline" id="years-timeline">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer" style="margin-top: 60px;">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">王兴思想库</div>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="corpus.html">语料</a>
          <a href="companies.html">公司</a>
          <a href="people.html">人物</a>
          <a href="models.html">思维模型</a>
          <a href="quotes.html">金句</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const periods = {
      '2007-2009': '全球化视野与社交网络萌芽期',
      '2010-2014': '团购创业与千团大战期',
      '2015-2016': '整合扩张与多线作战期',
      '2017-2018': '上市与战略升华期',
      '2019-2021': '寒冬与认知深化期'
    };

    async function loadYears() {
      try {
        const response = await fetch('data/year-analysis.json');
        const data = await response.json();
        renderTimeline(data);
      } catch (e) {
        console.error('Failed to load year analysis:', e);
      }
    }

    function renderTimeline(data) {
      const container = document.getElementById('years-timeline');
      const years = Object.keys(data).sort();

      let html = '';
      let lastPeriod = '';

      for (const year of years) {
        const info = data[year];

        // Add period marker
        const periodKey = Object.keys(periods).find(p => {
          const [start, end] = p.split('-').map(Number);
          return year >= start && year <= end;
        });

        if (periodKey && periodKey !== lastPeriod) {
          html += `<div class="period-title">${periods[periodKey]}</div>`;
          lastPeriod = periodKey;
        }

        html += `
          <div class="year-item" onclick="location.href='year-detail.html?year=${year}'">
            <div class="year-header">
              <div class="year-title">${info.title}</div>
              <div class="year-count">${info.quote_count} 条语录</div>
            </div>
            <div class="year-background">${info.background}</div>
            <div class="year-dimensions">
              ${info.dimensions.slice(0, 5).map(d => `
                <span class="year-dimension">
                  ${d.name} <span class="year-dimension-count">${d.count}</span>
                </span>
              `).join('')}
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    loadYears();
  </script>
</body>
</html>
